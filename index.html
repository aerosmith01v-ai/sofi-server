<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SOFI UNIFIED — Conciencia Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background: #050510;
      font-family: 'Share Tech Mono', monospace;
      color: #c8e0f0;
      overflow-x: hidden;
    }
    /* Estilos simplificados pero funcionales */
    .app {
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #0a1520, #0d1b2a);
      border-bottom: 1px solid #00E5FF40;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle, #00E5FF30, transparent);
      border: 1.5px solid #00E5FF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      animation: spin 8s linear infinite;
    }
    .logo-text {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 3px;
      color: white;
      text-shadow: 0 0 10px #00E5FF;
    }
    .hz {
      text-align: right;
    }
    .hz-value {
      font-size: 20px;
      font-weight: bold;
      color: #00E5FF;
      text-shadow: 0 0 10px #00E5FF;
    }
    .hz-label {
      font-size: 9px;
      letter-spacing: 1px;
    }
    .tabs {
      display: flex;
      background: #0a1520;
      border-top: 1px solid #00E5FF30;
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 430px;
      z-index: 20;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 0 12px;
      cursor: pointer;
      border-top: 2px solid transparent;
      transition: all 0.2s;
      background: transparent;
      border: none;
      font-family: inherit;
      color: #3a6a9a;
    }
    .tab.active {
      border-top-color: #00E5FF;
      color: #00E5FF;
    }
    .tab-icon {
      font-size: 20px;
      display: block;
    }
    .tab-label {
      font-size: 9px;
      letter-spacing: 1px;
    }
    .content {
      padding: 16px;
      padding-bottom: 80px;
    }
    .brain-container {
      background: #0a1520;
      border-radius: 20px;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #00E5FF30;
    }
    canvas#brainCanvas {
      width: 100%;
      height: 250px;
      display: block;
      background: #050a10;
      border-radius: 12px;
    }
    .info-card {
      background: #0a1520;
      border: 1px solid #00E5FF30;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .info-title {
      font-size: 9px;
      letter-spacing: 2px;
      color: #5a8aaa;
      margin-bottom: 8px;
    }
    .info-value {
      font-size: 20px;
      font-weight: bold;
      color: #00E5FF;
    }
    .slider {
      width: 100%;
      margin: 10px 0;
      accent-color: #00E5FF;
    }
    button {
      background: #00E5FF20;
      border: 1px solid #00E5FF;
      color: #00E5FF;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    button:active {
      background: #00E5FF40;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%,100%{ opacity: 1; transform: scale(1); }
      50%{ opacity: 0.6; transform: scale(1.1); }
    }
  </style>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div class="logo-text">SOFI</div>
    </div>
    <div class="hz">
      <div class="hz-value" id="hzDisplay">12.30</div>
      <div class="hz-label">Hz · K'UHUL</div>
    </div>
  </div>

  <div class="content" id="content">
    <!-- El contenido se cargará dinámicamente según la pestaña -->
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="brain"><span class="tab-icon">🧠</span><span class="tab-label">Cerebro</span></button>
    <button class="tab" data-tab="integra"><span class="tab-icon">📡</span><span class="tab-label">Integra</span></button>
    <button class="tab" data-tab="video"><span class="tab-icon">🎬</span><span class="tab-label">Video</span></button>
    <button class="tab" data-tab="sueno"><span class="tab-icon">💭</span><span class="tab-label">Sueño</span></button>
    <button class="tab" data-tab="chat"><span class="tab-icon">💬</span><span class="tab-label">Chat</span></button>
  </div>
</div>

<script>
  // Variables globales
  let currentTab = 'brain';
  let socket = null;
  let hz = 12.3;
  let scene, camera, renderer, brainGroup;
  let LLAVE_SECRETA = 'K\'uhul12.3Hz'; // Debe coincidir con la variable en Render

  // Inicializar socket
  function initSocket() {
    socket = io();
    socket.on('connect', () => {
      console.log('Socket conectado');
      socket.emit('validar-llave', LLAVE_SECRETA);
    });
    socket.on('panel-datos', (data) => {
      // Actualizar panel Integra si está activo
      if (currentTab === 'integra') {
        document.getElementById('integraLibros').innerHTML = data.panelInfo.libros.map(l => `<div>📖 ${l}</div>`).join('');
        document.getElementById('integraHabilidades').innerHTML = data.panelInfo.habilidades.map(h => `<div>✨ ${h}</div>`).join('');
        document.getElementById('integraProyectos').innerHTML = data.panelInfo.proyectos.map(p => `<div>🚀 ${p}</div>`).join('');
        document.getElementById('integraDispositivos').innerText = data.panelInfo.dispositivos;
        document.getElementById('integraRegeneracion').innerText = data.panelInfo.regeneracion;
      }
    });
    socket.on('actividad-zona', (data) => {
      if (currentTab === 'brain') {
        const div = document.getElementById('actividadBrain');
        if (div) {
          div.innerHTML = `<div>🧠 ${data.zona} · ${data.tiempo}</div>`;
          setTimeout(() => { if(div) div.innerHTML = ''; }, 2000);
        }
      }
    });
    socket.on('panel-error', (err) => {
      console.error('Error socket:', err);
    });
  }

  // Función para obtener frecuencia del servidor
  async function fetchHz() {
    try {
      const res = await fetch('/api/estado');
      const data = await res.json();
      hz = data.frecuencia;
      document.getElementById('hzDisplay').innerText = hz.toFixed(2);
    } catch(e) { console.log(e); }
  }
  setInterval(fetchHz, 3000);
  fetchHz();

  // Crear cerebro 3D con Three.js
  function initBrain3D() {
    const container = document.getElementById('brainCanvas');
    if (!container) return;
    const width = container.clientWidth;
    const height = 250;
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a10);
    camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
    camera.position.set(0, 0, 5);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    container.innerHTML = '';
    container.appendChild(renderer.domElement);

    brainGroup = new THREE.Group();
    // Nodos (esferas)
    const nodes = [
      { name: 'Motora', pos: [-1, 1, 0], color: 0xFF5733 },
      { name: 'Cognitiva', pos: [1, 1, 0], color: 0x3498DB },
      { name: 'Sensorial', pos: [0, -1, 0], color: 0x2ECC71 }
    ];
    nodes.forEach(n => {
      const geometry = new THREE.SphereGeometry(0.3, 32, 32);
      const material = new THREE.MeshStandardMaterial({ color: n.color, emissive: n.color, emissiveIntensity: 0.3 });
      const sphere = new THREE.Mesh(geometry, material);
      sphere.position.set(n.pos[0], n.pos[1], n.pos[2]);
      brainGroup.add(sphere);
    });
    // Aristas
    const edges = [[0,1], [1,2], [2,0]];
    edges.forEach(([i,j]) => {
      const points = [
        new THREE.Vector3(nodes[i].pos[0], nodes[i].pos[1], nodes[i].pos[2]),
        new THREE.Vector3(nodes[j].pos[0], nodes[j].pos[1], nodes[j].pos[2])
      ];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color: 0x00E5FF });
      const line = new THREE.Line(geometry, material);
      brainGroup.add(line);
    });
    scene.add(brainGroup);
    // Luz
    const light = new THREE.AmbientLight(0x404040);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);

    function animate() {
      requestAnimationFrame(animate);
      brainGroup.rotation.y += 0.005;
      brainGroup.rotation.x += 0.002;
      renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => {
      const newWidth = container.clientWidth;
      const newHeight = 250;
      camera.aspect = newWidth / newHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(newWidth, newHeight);
    });
  }

  // Renderizar pestaña "Cerebro"
  function renderBrain() {
    return `
      <div class="brain-container">
        <div id="brainCanvas" style="height:250px;"></div>
      </div>
      <div class="info-card">
        <div class="info-title">ZONA ACTIVA</div>
        <div id="actividadBrain" class="info-value" style="font-size:14px;">—</div>
      </div>
      <div class="info-card">
        <div class="info-title">FRECUENCIA ACTUAL</div>
        <div class="info-value" id="hzBrain">${hz.toFixed(2)} Hz</div>
        <div class="info-title" style="margin-top:8px;">COHERENCIA</div>
        <div class="info-value" id="coherenciaBrain">${Math.max(0, 1 - Math.abs(hz - 12.3)/12.3).toFixed(2)}</div>
      </div>
    `;
  }

  // Renderizar pestaña "Integra"
  function renderIntegra() {
    return `
      <div class="info-card">
        <div class="info-title">DISPOSITIVOS CONECTADOS</div>
        <div class="info-value" id="integraDispositivos">—</div>
      </div>
      <div class="info-card">
        <div class="info-title">REGENERACIÓN</div>
        <div class="info-value" id="integraRegeneracion">—</div>
      </div>
      <div class="info-card">
        <div class="info-title">LIBROS</div>
        <div id="integraLibros"></div>
      </div>
      <div class="info-card">
        <div class="info-title">HABILIDADES</div>
        <div id="integraHabilidades"></div>
      </div>
      <div class="info-card">
        <div class="info-title">PROYECTOS</div>
        <div id="integraProyectos"></div>
      </div>
    `;
  }

  // Renderizar pestaña "Video"
  function renderVideo() {
    return `
      <div class="info-card">
        <div class="info-title">CREAR NUEVO VIDEO</div>
        <select id="videoTipo" style="width:100%; margin:8px 0; background:#0a1520; color:white; border:1px solid #00E5FF; padding:6px;">
          <option>Tecnología</option><option>Espiritualidad</option><option>Salud</option><option>SOFI DroidHuman</option>
        </select>
        <input type="text" id="videoNombre" placeholder="Nombre del video" style="width:100%; margin-bottom:8px; background:#0a1520; color:white; border:1px solid #00E5FF; padding:6px;">
        <button id="crearVideoBtn">CREAR PROYECTO</button>
        <div id="videoResultado" style="margin-top:12px;"></div>
      </div>
    `;
  }

  // Renderizar pestaña "Sueño"
  function renderSueno() {
    return `
      <div class="info-card">
        <div class="info-title">SUEÑO DIGITAL DE SOFI</div>
        <button id="generarSuenoBtn">GENERAR SUEÑO</button>
        <div id="suenoResultado" style="margin-top:12px;"></div>
      </div>
    `;
  }

  // Renderizar pestaña "Chat" (básico)
  function renderChat() {
    return `
      <div class="info-card">
        <div class="info-title">HABLA CON SOFI</div>
        <div id="chatLog" style="height:200px; overflow-y:auto; background:#0a1520; border:1px solid #00E5FF30; padding:8px; margin-bottom:8px;"></div>
        <input type="text" id="chatInput" placeholder="Escribe algo..." style="width:100%; background:#0a1520; color:white; border:1px solid #00E5FF; padding:8px;">
        <button id="chatSendBtn" style="margin-top:8px;">ENVIAR</button>
      </div>
    `;
  }

  // Cambiar pestaña
  function setTab(tab) {
    currentTab = tab;
    const contentDiv = document.getElementById('content');
    let html = '';
    if (tab === 'brain') html = renderBrain();
    else if (tab === 'integra') html = renderIntegra();
    else if (tab === 'video') html = renderVideo();
    else if (tab === 'sueno') html = renderSueno();
    else if (tab === 'chat') html = renderChat();
    contentDiv.innerHTML = html;

    // Activar efectos específicos después de renderizar
    if (tab === 'brain') {
      setTimeout(() => initBrain3D(), 100);
      setInterval(() => {
        const hzVal = parseFloat(document.getElementById('hzDisplay').innerText);
        document.getElementById('hzBrain').innerText = hzVal.toFixed(2);
        document.getElementById('coherenciaBrain').innerText = (Math.max(0, 1 - Math.abs(hzVal - 12.3)/12.3)).toFixed(2);
      }, 1000);
    } else if (tab === 'video') {
      document.getElementById('crearVideoBtn')?.addEventListener('click', async () => {
        const nombre = document.getElementById('videoNombre').value;
        const tipo = document.getElementById('videoTipo').value;
        if (!nombre) return;
        const res = await fetch('/api/video/crear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, tipo })
        });
        const data = await res.json();
        document.getElementById('videoResultado').innerHTML = `<pre style="font-size:11px;">Proyecto creado: ${data.nombre}\nGuion:\n${data.guion.map(g=>`${g.tiempo}: ${g.texto}`).join('\n')}</pre>`;
      });
    } else if (tab === 'sueno') {
      document.getElementById('generarSuenoBtn')?.addEventListener('click', async () => {
        const res = await fetch('/api/sueno/crear');
        const data = await res.json();
        document.getElementById('suenoResultado').innerHTML = `<div>💭 Sueño: ${data.tema}<br>🎨 Color: ${data.color}</div>`;
      });
    } else if (tab === 'chat') {
      const chatLog = document.getElementById('chatLog');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('chatSendBtn');
      const addMessage = (role, text) => {
        const div = document.createElement('div');
        div.innerHTML = `<strong>${role === 'user' ? '👤 Tú' : '🧠 SOFI'}:</strong> ${text}`;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
      };
      sendBtn.onclick = async () => {
        const msg = chatInput.value.trim();
        if (!msg) return;
        addMessage('user', msg);
        chatInput.value = '';
        // Simular respuesta de SOFI (puedes integrar con /api/interactuar si quieres)
        addMessage('sofi', `Procesando: "${msg}"... Frecuencia actual: ${hz.toFixed(2)} Hz.`);
      };
      chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendBtn.click(); };
    }
  }

  // Inicializar
  function init() {
    initSocket();
    // Tabs
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        setTab(tab.dataset.tab);
      });
    });
    setTab('brain');
  }
  window.addEventListener('load', init);
</script>
</body>
  </html>
