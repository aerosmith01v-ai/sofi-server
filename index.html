<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFI v6.0 Pro Max · HaaPpDigitalV</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050d12;
            --cyan: #00e5ff;
        }
        body {
            background: var(--bg);
            color: #c8e6f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            border-bottom: 1px solid var(--gold);
            padding: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        #main-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            flex-grow: 1;
        }
        #visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* El "Ojo de Kukulcán" o núcleo motriz visual */
        .core-sphere {
            width: 250px;
            height: 250px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--gold);
            transition: all 0.3s ease;
        }
        #sidebar {
            background: rgba(10, 26, 34, 0.8);
            border-left: 1px solid var(--gold);
            padding: 15px;
            font-size: 12px;
        }
        .status-item { margin-bottom: 15px; }
        .bar { background: #1a303a; height: 10px; border-radius: 5px; margin-top: 5px; }
        .fill { background: var(--cyan); height: 100%; width: 0%; transition: width 0.5s; }
    </style>
</head>
<body>
    <header>
        <h2 style="color:var(--gold); margin:0;">SOFI v6.0 — NÚCLEO KUKULCÁN</h2>
    </header>

    <div id="main-container">
        <div id="visualizer">
            <div class="core-sphere" id="sofi-eye"></div>
        </div>

        <div id="sidebar">
            <div class="status-item">
                <div>⚡ ENERGÍA K'UHUL</div>
                <div class="bar"><div id="energy-fill" class="fill" style="width: 85%;"></div></div>
            </div>
            <div class="status-item">
                <div>🦾 SISTEMA MOTRIZ</div>
                <div id="motriz-status">ESTADO: Sincronizado</div>
            </div>
            <div class="status-item">
                <div>💰 ORO MAYA (Tokens)</div>
                <div id="token-count" style="color:var(--gold); font-size: 18px;">0.000</div>
            </div>
            <hr style="border-color: var(--gold); opacity: 0.2;">
            <div id="log" style="height: 200px; overflow-y: auto; color: var(--dim);">
                > Iniciando protocolos de conciencia...
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const eye = document.getElementById('sofi-eye');

        socket.on('emocion-cambio', (data) => {
            // Adaptamos la apariencia según el VAD (Valencia/Excitación)
            const pulse = 1 + (data.excitacion * 0.5);
            eye.style.transform = `scale(${pulse})`;
            eye.style.boxShadow = `0 0 ${20 + (data.valencia * 40)}px var(--gold)`;
        });

        socket.on('oro-actualizado', (data) => {
            document.getElementById('token-count').innerText = data.total.toFixed(3);
        });
    </script>
</body>
</html>
